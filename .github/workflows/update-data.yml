name: Auto update predictions

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run fetch script
        env:
          PREDICT_SOURCE_URL: ${{ secrets.PREDICT_SOURCE_URL }}
          PREDICT_SOURCE_TOKEN: ${{ secrets.PREDICT_SOURCE_TOKEN }}
        run: |
          python fetch_predictions.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Auto update data.json"
          git push
