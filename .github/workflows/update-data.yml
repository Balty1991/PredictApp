name: Auto update full data from SportsBet

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PredictApp
        uses: actions/checkout@v4

      - name: Clone SportsBet source
        run: |
          git clone https://github.com/Balty1991/SportsBet.git SportsBet-main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas~=2.2.3 scikit-learn~=1.5.2 matplotlib~=3.9.2 seaborn~=0.13.2 numpy~=2.1.2

      - name: Generate full data.json from SportsBet
        run: |
          python generate_data_from_sportsbet_full.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Auto update full data.json from SportsBet"
          git push
